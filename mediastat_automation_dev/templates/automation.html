<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation - MediaStat</title>
    <link rel="stylesheet" href="{{ ingress_path }}/static/app.css">
    <style>
        main { max-width: 1220px; margin: 24px auto; padding: 0 18px 32px; }
        .automation-grid {
            display: grid;
            grid-template-columns: minmax(280px, 0.85fr) minmax(0, 1.15fr);
            grid-template-areas:
                "config decision"
                "config request";
            gap: 14px;
            align-items: start;
        }
        .automation-panel {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            padding: 16px;
            min-width: 0;
        }
        .automation-panel.config-panel { grid-area: config; }
        .automation-panel.decision-panel { grid-area: decision; }
        .automation-panel.request-panel { grid-area: request; }
        .automation-panel h2 { margin: 0 0 12px; font-size: var(--fs-lg); }
        .automation-kv {
            display: grid;
            grid-template-columns: minmax(150px, 190px) minmax(0, 1fr);
            column-gap: 18px;
            row-gap: 10px;
            align-items: start;
        }
        .automation-kv dt {
            color: var(--muted);
            font-weight: 600;
            min-width: 0;
            overflow-wrap: anywhere;
        }
        .automation-kv dd {
            margin: 0;
            min-width: 0;
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        .decision-badge {
            display: inline-block;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 2px 9px;
            font-size: var(--fs-sm);
            text-transform: uppercase;
        }
        .decision-badge.accepted_dry_run { color: var(--blue); border-color: var(--blue); }
        .decision-badge.rejected { color: var(--red); border-color: var(--red); }
        .decision-badge.ignored { color: var(--yellow); border-color: var(--yellow); }
        .decision-badge.queued { color: var(--green); border-color: var(--green); }
        .source-table-wrap { width: 100%; overflow-x: auto; }
        .source-table { width: 100%; min-width: 720px; border-collapse: collapse; font-size: var(--fs-sm); }
        .source-table th, .source-table td { border-bottom: 1px solid var(--border); padding: 7px 6px; text-align: left; vertical-align: top; }
        .source-table td { overflow-wrap: anywhere; word-break: break-word; }
        .source-table th { color: var(--muted); font-weight: 600; }
        .history-table-wrap { width: 100%; overflow-x: auto; }
        .history-table { width: 100%; min-width: 1040px; border-collapse: collapse; font-size: var(--fs-sm); }
        .history-table th, .history-table td { border-bottom: 1px solid var(--border); padding: 7px 6px; text-align: left; vertical-align: top; }
        .history-table th { color: var(--muted); font-weight: 600; }
        .history-table td { overflow-wrap: anywhere; word-break: break-word; }
        .history-table .path-cell { min-width: 190px; max-width: 280px; overflow-wrap: anywhere; word-break: break-word; }
        .history-table .compact-cell { max-width: 140px; }
        .status-note { color: var(--muted); margin: 0 0 16px; }
        @media (max-width: 900px) {
            .automation-grid {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "config"
                    "decision"
                    "request";
            }
        }
        @media (max-width: 560px) {
            main { padding: 0 12px 28px; }
            .automation-kv { grid-template-columns: 1fr; row-gap: 4px; }
            .automation-kv dd { margin-bottom: 8px; }
        }
    </style>
</head>
<body>
<header>
    <a href="{{ ingress_path }}/" class="back-link">← MediaStat</a>
    <span style="color:var(--muted)">Automation</span>
</header>

<main>
    <p class="status-note">Automation V1 is dry-run first and keep-only. Tokens are never shown here.</p>

    <div class="automation-grid">
        <section class="automation-panel config-panel">
            <h2>Config</h2>
            <dl class="automation-kv" id="automation-config"></dl>
        </section>

        <section class="automation-panel decision-panel">
            <h2>Last Decision</h2>
            <dl class="automation-kv" id="automation-result"></dl>
        </section>

        <section class="automation-panel request-panel">
            <h2>Last Request</h2>
            <dl class="automation-kv" id="automation-request"></dl>
        </section>
    </div>

    <section class="automation-panel" style="margin-top:14px">
        <h2>Recent Automation History</h2>
        <div id="automation-history"></div>
    </section>

    <section class="automation-panel" style="margin-top:14px">
        <h2>Source Policy</h2>
        <div id="automation-sources"></div>
    </section>
</main>

<script>
const BASE_PATH = {{ ingress_path|tojson }};

function esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
}

function boolText(value) {
    return value ? 'true' : 'false';
}

function addRows(el, rows) {
    el.innerHTML = rows.map(([label, value]) =>
        `<dt>${esc(label)}</dt><dd>${value || '<span style="color:var(--muted)">none</span>'}</dd>`
    ).join('');
}

function displayDecision(decision) {
    const labels = {
        accepted_dry_run: 'Accepted dry-run',
        rejected: 'Rejected',
        ignored: 'Ignored',
        queued: 'Queued',
        accepted: 'Accepted'
    };
    const safe = esc(decision || 'none');
    const label = labels[decision] || safe;
    return `<span class="decision-badge ${safe}">${esc(label)}</span>`;
}

function listValue(value) {
    return Array.isArray(value) && value.length ? esc(value.join(', ')) : '';
}

function compactSource(value) {
    return esc([value.source, value.event, value.category].filter(Boolean).join(' / '));
}

function renderHistory(history) {
    const rows = (Array.isArray(history) ? history : []).map(item => {
        const reason = item.error || item.reason || '';
        return `
            <tr>
                <td>${esc(item.timestamp)}</td>
                <td>${displayDecision(item.decision || item.result)}</td>
                <td class="compact-cell">${compactSource(item)}</td>
                <td>${esc(boolText(item.dry_run))}</td>
                <td>${esc(boolText(item.queued))}</td>
                <td>${esc(boolText(item.ignored))}</td>
                <td class="compact-cell">${esc(item.profile)}</td>
                <td class="path-cell">${esc(item.input_path)}</td>
                <td class="path-cell">${esc(item.output_path)}</td>
                <td class="compact-cell">${esc(reason)}</td>
            </tr>
        `;
    }).join('');
    document.getElementById('automation-history').innerHTML = `
        <div class="history-table-wrap">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>timestamp</th>
                        <th>decision/result</th>
                        <th>source/event/category</th>
                        <th>dry_run</th>
                        <th>queued</th>
                        <th>ignored</th>
                        <th>profile</th>
                        <th>input_path</th>
                        <th>output_path</th>
                        <th>error/reason</th>
                    </tr>
                </thead>
                <tbody>${rows || '<tr><td colspan="10">No automation history recorded</td></tr>'}</tbody>
            </table>
        </div>
    `;
}

async function loadAutomationStatus() {
    const resp = await fetch(`${BASE_PATH}/automation/status`, { cache: 'no-store' });
    if (!resp.ok) throw new Error(`status ${resp.status}`);
    const data = await resp.json();

    addRows(document.getElementById('automation-config'), [
        ['enabled', esc(boolText(data.enabled))],
        ['dry_run', esc(boolText(data.dry_run))],
        ['allow_arr_sidecar_output', esc(boolText(data.allow_arr_sidecar_output))],
        ['default_profile', esc(data.default_profile)],
        ['default_post_action', esc(data.default_post_action)],
        ['token_configured', esc(boolText(data.token_configured))],
        ['enabled_sources', listValue(data.enabled_sources)]
    ]);

    const result = data.last_automation_result || {};
    addRows(document.getElementById('automation-result'), [
        ['decision', displayDecision(result.decision)],
        ['reason', esc(result.reason)],
        ['source/event/category', esc([result.source, result.event, result.category].filter(Boolean).join(' / '))],
        ['profile/post_action', esc([result.profile, result.post_action].filter(Boolean).join(' / '))],
        ['input_path', esc(result.input_path)],
        ['output_path', esc(result.output_path)],
        ['job_id', esc(result.job_id)],
        ['timestamp', esc(data.last_automation_timestamp)]
    ]);

    const req = data.last_automation_request || {};
    addRows(document.getElementById('automation-request'), [
        ['source/event/category', esc([req.source, req.event, req.category].filter(Boolean).join(' / '))],
        ['profile/post_action', esc([req.profile, req.post_action].filter(Boolean).join(' / '))],
        ['input_path', esc(req.input_path)],
        ['output_path', esc(req.output_path)]
    ]);

    renderHistory(data.automation_history || []);

    const sources = data.sources || {};
    const rows = Object.entries(sources).map(([name, cfg]) => `
        <tr>
            <td>${esc(name)}</td>
            <td>${esc(boolText(cfg.enabled))}</td>
            <td>${listValue(cfg.allowed_events)}</td>
            <td>${esc(cfg.default_profile)}</td>
            <td>${esc(cfg.default_post_action)}</td>
            <td>${esc(boolText(cfg.allow_replace))}</td>
        </tr>
    `).join('');
    document.getElementById('automation-sources').innerHTML = `
        <div class="source-table-wrap">
            <table class="source-table">
                <thead>
                    <tr><th>source</th><th>enabled</th><th>events</th><th>profile</th><th>post action</th><th>replace</th></tr>
                </thead>
                <tbody>${rows || '<tr><td colspan="6">No source policy configured</td></tr>'}</tbody>
            </table>
        </div>
    `;
}

loadAutomationStatus().catch(err => {
    document.getElementById('automation-result').innerHTML =
        `<dt>error</dt><dd>${esc(err.message)}</dd>`;
});
</script>
</body>
</html>
