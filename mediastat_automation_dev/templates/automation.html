<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation - MediaStat</title>
    <link rel="stylesheet" href="{{ ingress_path }}/static/app.css">
    <style>
        main { max-width: 1220px; margin: 24px auto; padding: 0 18px 32px; }
        .automation-grid {
            display: grid;
            grid-template-columns: minmax(280px, 0.85fr) minmax(0, 1.15fr);
            grid-template-areas:
                "config decision"
                "config request";
            gap: 14px;
            align-items: start;
        }
        .automation-panel {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            padding: 16px;
            min-width: 0;
        }
        .automation-panel.config-panel { grid-area: config; }
        .automation-panel.decision-panel { grid-area: decision; }
        .automation-panel.request-panel { grid-area: request; }
        .automation-panel h2 { margin: 0 0 12px; font-size: var(--fs-lg); }
        .automation-kv {
            display: grid;
            grid-template-columns: minmax(150px, 190px) minmax(0, 1fr);
            column-gap: 18px;
            row-gap: 10px;
            align-items: start;
        }
        .automation-kv dt {
            color: var(--muted);
            font-weight: 600;
            min-width: 0;
            overflow-wrap: anywhere;
        }
        .automation-kv dd {
            margin: 0;
            min-width: 0;
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        .decision-badge {
            display: inline-block;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 2px 9px;
            font-size: var(--fs-sm);
            text-transform: uppercase;
        }
        .decision-badge.accepted_dry_run { color: var(--blue); border-color: var(--blue); }
        .decision-badge.rejected { color: var(--red); border-color: var(--red); }
        .decision-badge.file_unstable { color: var(--red); border-color: var(--red); }
        .decision-badge.ignored { color: var(--yellow); border-color: var(--yellow); }
        .decision-badge.queued { color: var(--green); border-color: var(--green); }
        .source-table-wrap { width: 100%; overflow-x: auto; }
        .source-table { width: 100%; min-width: 720px; border-collapse: collapse; font-size: var(--fs-sm); }
        .source-table th, .source-table td { border-bottom: 1px solid var(--border); padding: 7px 6px; text-align: left; vertical-align: top; }
        .source-table td { overflow-wrap: anywhere; word-break: break-word; }
        .source-table th { color: var(--muted); font-weight: 600; }
        .history-list { display: grid; gap: 12px; }
        .history-item {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255,255,255,0.025);
            padding: 13px;
            min-width: 0;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            gap: 10px 16px;
            align-items: flex-start;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .history-meta { display: grid; gap: 4px; min-width: 0; }
        .history-timestamp { color: var(--muted); font-size: var(--fs-sm); overflow-wrap: anywhere; }
        .history-source { font-weight: 600; overflow-wrap: anywhere; word-break: break-word; }
        .history-badges { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; min-width: 0; }
        .history-badge {
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            font-size: var(--fs-sm);
            white-space: nowrap;
        }
        .history-badge.dry_run-true { color: var(--blue); border-color: var(--blue); }
        .history-badge.queued-true { color: var(--green); border-color: var(--green); }
        .history-badge.ignored-true { color: var(--yellow); border-color: var(--yellow); }
        .history-badge.file_stable-true { color: var(--green); border-color: var(--green); }
        .history-badge.file_stable-false { color: var(--red); border-color: var(--red); }
        .history-badge.would_queue-true { color: var(--green); border-color: var(--green); }
        .history-badge.would_queue-false { color: var(--muted); border-color: var(--border); }
        .history-body, .history-footer { display: grid; gap: 8px; min-width: 0; }
        .history-footer {
            border-top: 1px solid var(--border);
            margin-top: 10px;
            padding-top: 10px;
        }
        .history-field {
            display: grid;
            grid-template-columns: minmax(110px, 150px) minmax(0, 1fr);
            gap: 8px 12px;
            align-items: start;
            min-width: 0;
        }
        .history-label { color: var(--muted); font-weight: 600; overflow-wrap: anywhere; }
        .history-value { min-width: 0; overflow-wrap: anywhere; word-break: break-word; }
        .path-value { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; }
        .history-empty { color: var(--muted); margin: 0; }
        .status-note { color: var(--muted); margin: 0 0 16px; }
        @media (max-width: 900px) {
            .automation-grid {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "config"
                    "decision"
                    "request";
            }
        }
        @media (max-width: 560px) {
            main { padding: 0 12px 28px; }
            .automation-kv { grid-template-columns: 1fr; row-gap: 4px; }
            .automation-kv dd { margin-bottom: 8px; }
            .history-header { display: grid; }
            .history-badges { justify-content: flex-start; }
            .history-field { grid-template-columns: 1fr; gap: 3px; }
        }
    </style>
</head>
<body>
<header>
    <a href="{{ ingress_path }}/" class="back-link">← MediaStat</a>
    <span style="color:var(--muted)">Automation</span>
</header>

<main>
    <p class="status-note">Automation V1 is dry-run first and keep-only. Tokens are never shown here.</p>

    <div class="automation-grid">
        <section class="automation-panel config-panel">
            <h2>Config</h2>
            <dl class="automation-kv" id="automation-config"></dl>
        </section>

        <section class="automation-panel decision-panel">
            <h2>Last Decision</h2>
            <dl class="automation-kv" id="automation-result"></dl>
        </section>

        <section class="automation-panel request-panel">
            <h2>Last Request</h2>
            <dl class="automation-kv" id="automation-request"></dl>
        </section>
    </div>

    <section class="automation-panel" style="margin-top:14px">
        <h2>Recent Automation History</h2>
        <div id="automation-history"></div>
    </section>

    <section class="automation-panel" style="margin-top:14px">
        <h2>Source Policy</h2>
        <div id="automation-sources"></div>
    </section>
</main>

<script>
const BASE_PATH = {{ ingress_path|tojson }};

function esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
}

function boolValue(value) {
    if (typeof value === 'string') {
        return ['true', '1', 'yes', 'on'].includes(value.trim().toLowerCase());
    }
    return Boolean(value);
}

function boolText(value) {
    return boolValue(value) ? 'true' : 'false';
}

function isBlank(value) {
    return value === null || value === undefined || value === '';
}

function displayValue(value) {
    return isBlank(value) ? '<span style="color:var(--muted)">none</span>' : esc(value);
}

function optionalBoolText(value) {
    return isBlank(value) ? '' : boolText(value);
}

function sizeValue(item, key) {
    const human = item[`${key}_human`];
    return isBlank(human) ? item[key] : human;
}

function previewValue(item, key) {
    const preview = item.job_preview || {};
    return isBlank(item[key]) ? preview[key] : item[key];
}

function hasPreview(item) {
    return !isBlank(previewValue(item, 'would_queue')) ||
        !isBlank(previewValue(item, 'queue_blocked_by')) ||
        !isBlank(previewValue(item, 'preview_status'));
}

function previewSummary(item) {
    if (!hasPreview(item)) return '';
    const parts = [];
    const wouldQueue = previewValue(item, 'would_queue');
    const blockedBy = previewValue(item, 'queue_blocked_by');
    const status = previewValue(item, 'preview_status');
    const scheduleOpen = previewValue(item, 'schedule_currently_open');
    const plannedSource = [previewValue(item, 'planned_source'), previewValue(item, 'planned_event')].filter(v => !isBlank(v)).join(' / ');
    const plannedProfile = [previewValue(item, 'planned_profile'), previewValue(item, 'planned_post_action')].filter(v => !isBlank(v)).join(' / ');
    if (!isBlank(wouldQueue)) parts.push(`would_queue ${boolText(wouldQueue)}`);
    if (!isBlank(blockedBy)) parts.push(`blocked_by ${blockedBy}`);
    if (!isBlank(status)) parts.push(`status ${status}`);
    if (!isBlank(previewValue(item, 'schedule_window'))) parts.push(`schedule ${previewValue(item, 'schedule_window')}`);
    if (!isBlank(scheduleOpen)) parts.push(`open ${boolText(scheduleOpen)}`);
    if (plannedSource) parts.push(`planned ${plannedSource}`);
    if (plannedProfile) parts.push(plannedProfile);
    return parts.join(' / ');
}

function addRows(el, rows) {
    el.innerHTML = rows.map(([label, value]) =>
        `<dt>${esc(label)}</dt><dd>${value || '<span style="color:var(--muted)">none</span>'}</dd>`
    ).join('');
}

function displayDecision(decision) {
    const labels = {
        accepted_dry_run: 'Accepted dry-run',
        rejected: 'Rejected',
        file_unstable: 'File unstable',
        ignored: 'Ignored',
        queued: 'Queued',
        accepted: 'Accepted'
    };
    const safe = esc(decision || 'none');
    const label = labels[decision] || safe;
    return `<span class="decision-badge ${safe}">${esc(label)}</span>`;
}

function listValue(value) {
    return Array.isArray(value) && value.length ? esc(value.join(', ')) : '';
}

function compactSource(value) {
    return esc([value.source, value.event, value.category].filter(Boolean).join(' / '));
}

function classToken(value) {
    return String(value || 'none').toLowerCase().replace(/[^a-z0-9_-]/g, '-');
}

function historyDecisionBadge(item) {
    const decision = item.decision || item.result || 'none';
    const labels = {
        accepted_dry_run: 'ACCEPTED DRY-RUN',
        file_unstable: 'FILE UNSTABLE',
        rejected: 'ERROR',
        ignored: 'IGNORED',
        queued: 'QUEUED',
        accepted: 'ACCEPTED'
    };
    return `<span class="decision-badge ${classToken(decision)}">${esc(labels[decision] || decision)}</span>`;
}

function flagBadge(label, value) {
    const flag = boolText(value);
    return `<span class="history-badge ${classToken(label)}-${flag}">${esc(label)} ${esc(flag)}</span>`;
}

function optionalFlagBadge(label, value) {
    return isBlank(value) ? '' : flagBadge(label, value);
}

function historyField(label, value, extraClass = '') {
    const valueClass = extraClass ? `history-value ${extraClass}` : 'history-value';
    return `
        <div class="history-field">
            <div class="history-label">${esc(label)}</div>
            <div class="${valueClass}">${displayValue(value)}</div>
        </div>
    `;
}

function hasStability(item) {
    return !isBlank(item.file_stable) ||
        !isBlank(item.stability_check_enabled) ||
        !isBlank(item.stability_wait_seconds);
}

function stabilitySummary(item) {
    if (!hasStability(item)) return '';
    const parts = [
        `enabled ${optionalBoolText(item.stability_check_enabled)}`,
        `wait ${displayValue(item.stability_wait_seconds)}s`
    ];
    if (!isBlank(item.file_stable)) {
        parts.push(`stable ${boolText(item.file_stable)}`);
    }
    const sizeBefore = sizeValue(item, 'size_before');
    const sizeAfter = sizeValue(item, 'size_after');
    if (!isBlank(sizeBefore) || !isBlank(sizeAfter)) {
        parts.push(`size ${isBlank(sizeBefore) ? 'none' : sizeBefore} -> ${isBlank(sizeAfter) ? 'none' : sizeAfter}`);
    }
    return parts.join(' / ');
}

function renderHistory(history) {
    const items = Array.isArray(history) ? history : [];
    if (!items.length) {
        document.getElementById('automation-history').innerHTML =
            '<p class="history-empty">No automation history recorded</p>';
        return;
    }

    const cards = items.map(item => {
        const reason = item.error || item.reason || '';
        const warnings = Array.isArray(item.warnings) ? item.warnings.filter(Boolean).join(', ') : '';
        const source = compactSource(item) || '<span style="color:var(--muted)">none</span>';
        const footer = [
            reason ? historyField('error/reason', reason) : '',
            item.stability_reason ? historyField('stability_reason', item.stability_reason) : '',
            warnings ? historyField('warnings', warnings) : ''
        ].join('');
        return `
            <article class="history-item">
                <div class="history-header">
                    <div class="history-meta">
                        <div class="history-timestamp">${esc(item.timestamp)}</div>
                        <div class="history-source">${source}</div>
                    </div>
                    <div class="history-badges">
                        ${historyDecisionBadge(item)}
                        ${optionalFlagBadge('would_queue', previewValue(item, 'would_queue'))}
                        ${optionalFlagBadge('file_stable', item.file_stable)}
                        ${flagBadge('dry_run', item.dry_run)}
                        ${flagBadge('queued', item.queued)}
                        ${flagBadge('ignored', item.ignored)}
                    </div>
                </div>
                <div class="history-body">
                    ${historyField('profile', item.profile)}
                    ${hasPreview(item) ? historyField('job_preview', previewSummary(item)) : ''}
                    ${hasStability(item) ? historyField('file_stability', stabilitySummary(item)) : ''}
                    ${historyField('input_path', item.input_path, 'path-value')}
                    ${historyField('output_path', item.output_path, 'path-value')}
                </div>
                ${footer ? `<div class="history-footer">${footer}</div>` : ''}
            </article>
        `;
    }).join('');
    document.getElementById('automation-history').innerHTML = `
        <div class="history-list">${cards}</div>
    `;
}

async function loadAutomationStatus() {
    const resp = await fetch(`${BASE_PATH}/automation/status`, { cache: 'no-store' });
    if (!resp.ok) throw new Error(`status ${resp.status}`);
    const data = await resp.json();

    addRows(document.getElementById('automation-config'), [
        ['enabled', esc(boolText(data.enabled))],
        ['dry_run', esc(boolText(data.dry_run))],
        ['allow_arr_sidecar_output', esc(boolText(data.allow_arr_sidecar_output))],
        ['file_stability_check_enabled', esc(boolText(data.file_stability_check_enabled))],
        ['file_stability_wait_seconds', esc(data.file_stability_wait_seconds)],
        ['review_output_enabled', esc(boolText(data.review_output_enabled))],
        ['review_output_root', esc(data.review_output_root)],
        ['default_profile', esc(data.default_profile)],
        ['default_post_action', esc(data.default_post_action)],
        ['token_configured', esc(boolText(data.token_configured))],
        ['enabled_sources', listValue(data.enabled_sources)]
    ]);

    const result = data.last_automation_result || {};
    const previewRows = hasPreview(result) ? [
        ['job_preview', esc(previewSummary(result))],
        ['would_queue', esc(optionalBoolText(previewValue(result, 'would_queue')))],
        ['queue_blocked_by', esc(previewValue(result, 'queue_blocked_by'))],
        ['preview_status', esc(previewValue(result, 'preview_status'))],
        ['schedule_enabled', esc(optionalBoolText(previewValue(result, 'schedule_enabled')))],
        ['schedule_window', esc(previewValue(result, 'schedule_window'))],
        ['schedule_currently_open', esc(optionalBoolText(previewValue(result, 'schedule_currently_open')))],
        ['schedule_reason', esc(previewValue(result, 'schedule_reason'))],
        ['planned_source/event', esc([previewValue(result, 'planned_source'), previewValue(result, 'planned_event')].filter(v => !isBlank(v)).join(' / '))],
        ['planned_profile/post_action', esc([previewValue(result, 'planned_profile'), previewValue(result, 'planned_post_action')].filter(v => !isBlank(v)).join(' / '))],
        ['planned_input_path', esc(previewValue(result, 'planned_input_path'))],
        ['planned_output_path', esc(previewValue(result, 'planned_output_path'))]
    ] : [];
    const stabilityRows = hasStability(result) ? [
        ['file_stable', esc(optionalBoolText(result.file_stable))],
        ['stability_check_enabled', esc(optionalBoolText(result.stability_check_enabled))],
        ['stability_wait_seconds', esc(result.stability_wait_seconds)],
        ['size_before', esc(sizeValue(result, 'size_before'))],
        ['size_after', esc(sizeValue(result, 'size_after'))],
        ['mtime_before', esc(result.mtime_before)],
        ['mtime_after', esc(result.mtime_after)],
        ['stability_reason', esc(result.stability_reason)]
    ] : [];
    addRows(document.getElementById('automation-result'), [
        ['decision', displayDecision(result.decision)],
        ['reason', esc(result.reason)],
        ['source/event/category', esc([result.source, result.event, result.category].filter(Boolean).join(' / '))],
        ['profile/post_action', esc([result.profile, result.post_action].filter(Boolean).join(' / '))],
        ['input_path', esc(result.input_path)],
        ['output_path', esc(result.output_path)],
        ...previewRows,
        ...stabilityRows,
        ['job_id', esc(result.job_id)],
        ['timestamp', esc(data.last_automation_timestamp)]
    ]);

    const req = data.last_automation_request || {};
    addRows(document.getElementById('automation-request'), [
        ['source/event/category', esc([req.source, req.event, req.category].filter(Boolean).join(' / '))],
        ['profile/post_action', esc([req.profile, req.post_action].filter(Boolean).join(' / '))],
        ['input_path', esc(req.input_path)],
        ['output_path', esc(req.output_path)]
    ]);

    renderHistory(data.automation_history || []);

    const sources = data.sources || {};
    const rows = Object.entries(sources).map(([name, cfg]) => `
        <tr>
            <td>${esc(name)}</td>
            <td>${esc(boolText(cfg.enabled))}</td>
            <td>${listValue(cfg.allowed_events)}</td>
            <td>${esc(cfg.default_profile)}</td>
            <td>${esc(cfg.default_post_action)}</td>
            <td>${esc(boolText(cfg.allow_replace))}</td>
        </tr>
    `).join('');
    document.getElementById('automation-sources').innerHTML = `
        <div class="source-table-wrap">
            <table class="source-table">
                <thead>
                    <tr><th>source</th><th>enabled</th><th>events</th><th>profile</th><th>post action</th><th>replace</th></tr>
                </thead>
                <tbody>${rows || '<tr><td colspan="6">No source policy configured</td></tr>'}</tbody>
            </table>
        </div>
    `;
}

loadAutomationStatus().catch(err => {
    document.getElementById('automation-result').innerHTML =
        `<dt>error</dt><dd>${esc(err.message)}</dd>`;
});
</script>
</body>
</html>
